services:
  db:
    ports:
      - "5432:5432"

  db-test:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bank-test-db
    ports:
      - "5433:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data

  jaeger:
    ports:
      - "16686:16686"
      - "4318:4318"

volumes:
  pgdata-test:
  